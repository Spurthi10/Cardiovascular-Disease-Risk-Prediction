<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Register — CardioGuard</title>
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
<div class="auth-wrap">
  <div class="auth-card fade-up">
    <a href="/" class="auth-logo">
      <div class="logo-icon">🫀</div>
      CardioGuard
    </a>
    <div class="auth-title">Create your account</div>
    <div class="auth-sub">Start monitoring your cardiovascular risk today</div>

    <div class="alert" id="alert"></div>

    <div class="form-group">
      <label class="form-label">Full Name</label>
      <input type="text" id="name" class="form-control" placeholder="John Doe" autocomplete="name" />
    </div>
    <div class="form-group">
      <label class="form-label">Email Address</label>
      <input type="email" id="email" class="form-control" placeholder="you@example.com" autocomplete="email" />
    </div>
    <div class="form-group">
      <label class="form-label">Password</label>
      <input type="password" id="password" class="form-control" placeholder="Min. 6 characters" autocomplete="new-password" />
    </div>
    <div class="form-group">
      <label class="form-label">Confirm Password</label>
      <input type="password" id="password2" class="form-control" placeholder="Repeat password" />
    </div>

    <button class="btn btn-primary btn-full" id="regBtn" onclick="handleRegister()">
      Create Account
    </button>

    <div class="auth-footer">
      Already have an account? <a href="/login">Sign in</a>
    </div>
    <div style="margin-top:1rem;font-size:0.75rem;color:var(--text3);text-align:center">
      ⚠️ CardioGuard is for educational use only. Consult a physician for medical advice.
    </div>
  </div>
</div>

<script src="/js/main.js"></script>
<script>
getUser().then(u => { if (u.loggedIn) window.location.href = '/dashboard'; });

async function handleRegister() {
  const btn = document.getElementById('regBtn');
  const alert = document.getElementById('alert');
  const name = document.getElementById('name').value.trim();
  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  const password2 = document.getElementById('password2').value;

  if (!name || !email || !password || !password2) return showAlert(alert, 'Please fill in all fields.');
  if (password !== password2) return showAlert(alert, 'Passwords do not match.');
  if (password.length < 6) return showAlert(alert, 'Password must be at least 6 characters.');

  btn.disabled = true;
  btn.innerHTML = '<span class="loader"></span> Creating account…';

  try {
    const res = await fetch('/auth/register', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ name, email, password })
    });
    const data = await res.json();
    if (data.success) {
      window.location.href = data.redirect;
    } else {
      showAlert(alert, data.message);
      btn.disabled = false;
      btn.innerHTML = 'Create Account';
    }
  } catch {
    showAlert(alert, 'Network error. Please try again.');
    btn.disabled = false;
    btn.innerHTML = 'Create Account';
  }
}
</script>
</body>
</html>
